<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chrome Automation Template</title>
  <link rel="stylesheet" href="/web/styles.css" />
</head>
<body>
  <div class="bg"></div>
  <main class="container">
    <header class="topbar">
      <div>
        <h1>Chrome Automation Template</h1>
        <p class="sub">จัดการ Chrome Profile + Custom Prompt</p>
      </div>
      <button id="openSettings" class="gear" title="Settings">⚙️</button>
    </header>

    <div class="layout-grid">
      <section class="card left-col">
        <div class="row" style="justify-content: space-between; align-items: center; margin-bottom: 12px;">
          <h2 style="margin:0;">Chrome Profiles</h2>
          <button id="addProfileBtn" class="secondary" style="padding: 6px 12px; font-size: 0.88rem;">+ Add Profile</button>
        </div>
        <label>Available Profiles <span id="portStatusBadge" class="status-badge offline">Checking...</span></label>
        <select id="profileSelect"></select>

        <div class="row wrap">
          <button id="launchProfile">Launch Selected</button>
          <button id="setProfile" class="secondary">Set as default</button>
          <button id="editProfileBtn" class="secondary">Edit Selected</button>
        </div>
        <p id="profileMsg" class="msg"></p>
      </section>

      <section class="card right-col">
        <h2>Custom Prompt Dispatcher</h2>
        <div id="promptList" class="prompt-list"></div>
        <div class="row">
          <button id="addPrompt" class="secondary">+ Add Prompt</button>
          <button id="savePrompts">Save Prompts</button>
        </div>
        <p id="dispatchMsg" class="msg"></p>
      </section>
    </div>
  </main>

  <div id="settingsModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h3>API Settings</h3>
        <button id="closeSettings" class="secondary">Close</button>
      </div>

      <div class="provider">
        <label>OpenAI API Key</label>
        <input id="openaiKey" type="password" placeholder="sk-..." />
        <button onclick="testProvider('openai', 'openaiKey', 'openaiMsg')">Test OpenAI</button>
        <p id="openaiMsg" class="msg"></p>
      </div>

      <div class="provider">
        <label>Gemini API Key</label>
        <input id="geminiKey" type="password" placeholder="AIza..." />
        <button onclick="testProvider('gemini', 'geminiKey', 'geminiMsg2')">Test Gemini</button>
        <p id="geminiMsg2" class="msg"></p>
      </div>

      <div class="provider">
        <label>OpenRouter API Key</label>
        <input id="openrouterKey" type="password" placeholder="sk-or-v1-..." />
        <button onclick="testProvider('openrouter', 'openrouterKey', 'openrouterMsg')">Test OpenRouter</button>
        <p id="openrouterMsg" class="msg"></p>
      </div>

      <button id="saveSettings">Save Settings</button>
      <p id="settingsMsg" class="msg"></p>
    </div>
  </div>

  <div id="profileModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h3>Manage Chrome Profile</h3>
        <button id="closeProfileModal" class="secondary">Close</button>
      </div>

      <label>Profile Name</label>
      <input id="profileName" placeholder="e.g. work-profile-1" />

      <label>Debug Port</label>
      <input id="debugPort" type="number" value="9222" />

      <label>Startup Websites (ใส่ทีละบรรทัด)</label>
      <textarea id="startupUrls" rows="6" placeholder="https://chatgpt.com&#10;https://gemini.google.com/app"></textarea>

      <div class="row">
        <button id="createProfile">Create Profile</button>
        <button id="updateProfile" class="secondary">Update Profile</button>
      </div>
      <p id="modalProfileMsg" class="msg"></p>
    </div>
  </div>

  <script src="/web/app.js"></script>
</body>
</html>
