<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chrome Automation Template</title>
  <link rel="stylesheet" href="/web/styles.css" />
</head>
<body>
  <div class="bg"></div>
  <main class="container">
    <header class="topbar">
      <div>
        <h1>Chrome Automation Template</h1>
        <p class="sub">Create/select Chrome profiles, launch with debug port, and run Gemini automation.</p>
      </div>
      <button id="openSettings" class="gear" title="Settings">⚙️</button>
    </header>

    <section class="card">
      <h2>Chrome Profiles</h2>
      <label>Profile Name</label>
      <input id="profileName" placeholder="e.g. work-profile-1" />

      <label>Debug Port (used at creation)</label>
      <input id="debugPort" type="number" value="9222" />

      <div class="row">
        <button id="createProfile">Create Profile</button>
        <button id="launchProfile" class="secondary">Launch Selected Profile</button>
      </div>
      <p id="profileMsg" class="msg"></p>

      <label>Available Profiles</label>
      <select id="profileSelect"></select>
      <button id="setProfile" class="secondary">Set as default</button>
    </section>

    <section class="card">
      <h2>Gemini Image Automation (Copied logic base from ddcm-browser-helper-ai)</h2>
      <label>Prompts (one prompt per line)</label>
      <textarea id="prompts" rows="7" placeholder="Prompt 1&#10;Prompt 2"></textarea>
      <label class="checkbox-wrap">
        <input type="checkbox" id="downloadImages" />
        <span>Click Gemini "Download generated image" buttons after generation</span>
      </label>
      <button id="runGemini">Run Gemini Automation</button>
      <p id="geminiMsg" class="msg"></p>
    </section>
  </main>

  <div id="settingsModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h3>API Settings</h3>
        <button id="closeSettings" class="secondary">Close</button>
      </div>

      <div class="provider">
        <label>OpenAI API Key</label>
        <input id="openaiKey" type="password" placeholder="sk-..." />
        <button onclick="testProvider('openai', 'openaiKey', 'openaiMsg')">Test OpenAI</button>
        <p id="openaiMsg" class="msg"></p>
      </div>

      <div class="provider">
        <label>Gemini API Key</label>
        <input id="geminiKey" type="password" placeholder="AIza..." />
        <button onclick="testProvider('gemini', 'geminiKey', 'geminiMsg2')">Test Gemini</button>
        <p id="geminiMsg2" class="msg"></p>
      </div>

      <div class="provider">
        <label>OpenRouter API Key</label>
        <input id="openrouterKey" type="password" placeholder="sk-or-v1-..." />
        <button onclick="testProvider('openrouter', 'openrouterKey', 'openrouterMsg')">Test OpenRouter</button>
        <p id="openrouterMsg" class="msg"></p>
      </div>

      <button id="saveSettings">Save Settings</button>
      <p id="settingsMsg" class="msg"></p>
    </div>
  </div>

  <script src="/web/app.js"></script>
</body>
</html>
