<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chrome Automation Template</title>
  <link rel="stylesheet" href="/web/styles.css" />
</head>
<body>
  <div class="bg"></div>
  <main class="container">
    <header class="topbar">
      <div>
        <h1>Chrome Automation Template</h1>
        <p class="sub">จัดการ Chrome Profile + ส่ง Prompt ไป ChatGPT/Gemini ได้ในหน้าเดียว</p>
      </div>
      <button id="openSettings" class="gear" title="Settings">⚙️</button>
    </header>

    <section class="card">
      <h2>Chrome Profiles</h2>
      <label>Profile Name</label>
      <input id="profileName" placeholder="e.g. work-profile-1" />

      <label>Debug Port</label>
      <input id="debugPort" type="number" value="9222" />

      <label>Startup Websites (ใส่ทีละบรรทัด)</label>
      <textarea id="startupUrls" rows="4" placeholder="https://chatgpt.com&#10;https://gemini.google.com/app"></textarea>

      <div class="row">
        <button id="createProfile">Create Profile</button>
        <button id="updateProfile" class="secondary">Update Profile</button>
        <button id="launchProfile" class="secondary">Launch Selected</button>
      </div>

      <label>Available Profiles</label>
      <select id="profileSelect"></select>
      <button id="setProfile" class="secondary">Set as default</button>
      <p id="profileMsg" class="msg"></p>
    </section>

    <section class="card">
      <h2>Custom Prompt Dispatcher</h2>
      <label>Prompt</label>
      <textarea id="customPrompt" rows="4" placeholder="พิมพ์ prompt ที่ต้องการ"></textarea>

      <label>เลือกปลายทาง</label>
      <div class="row wrap">
        <label class="checkbox-wrap"><input type="checkbox" value="chatgpt" class="target" checked><span>ChatGPT</span></label>
        <label class="checkbox-wrap"><input type="checkbox" value="gemini" class="target" checked><span>Gemini</span></label>
        <label class="checkbox-wrap"><input type="checkbox" value="claude" class="target"><span>Claude</span></label>
      </div>

      <button id="dispatchPrompt">Send Prompt</button>
      <p id="dispatchMsg" class="msg"></p>
    </section>
  </main>

  <div id="settingsModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h3>API Settings</h3>
        <button id="closeSettings" class="secondary">Close</button>
      </div>

      <div class="provider">
        <label>OpenAI API Key</label>
        <input id="openaiKey" type="password" placeholder="sk-..." />
        <button onclick="testProvider('openai', 'openaiKey', 'openaiMsg')">Test OpenAI</button>
        <p id="openaiMsg" class="msg"></p>
      </div>

      <div class="provider">
        <label>Gemini API Key</label>
        <input id="geminiKey" type="password" placeholder="AIza..." />
        <button onclick="testProvider('gemini', 'geminiKey', 'geminiMsg2')">Test Gemini</button>
        <p id="geminiMsg2" class="msg"></p>
      </div>

      <div class="provider">
        <label>OpenRouter API Key</label>
        <input id="openrouterKey" type="password" placeholder="sk-or-v1-..." />
        <button onclick="testProvider('openrouter', 'openrouterKey', 'openrouterMsg')">Test OpenRouter</button>
        <p id="openrouterMsg" class="msg"></p>
      </div>

      <button id="saveSettings">Save Settings</button>
      <p id="settingsMsg" class="msg"></p>
    </div>
  </div>

  <script src="/web/app.js"></script>
</body>
</html>
